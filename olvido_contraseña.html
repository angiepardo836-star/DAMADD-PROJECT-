<!DOCTYPE html>

<html lang="es">
<!-- Página en idioma español -->
<head>
    <!-- Metadatos de la página -->
    <meta charset="UTF-8">
    <!-- Uso de UTF-8 para caracteres especiales -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Ajusta el zoom y tamaño en móviles -->
    <title>DAMADD billar</title>
    <!-- Texto que aparece en la pestaña del navegador -->
    <link rel="stylesheet" href="estilos/olvido_contraseña.css">
    <link rel="stylesheet" href="estilos/variables.css">
    <!-- Carga estilos específicos de la pantalla de olvido de contraseña -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
</head>

<body>
    <div class="fondo"></div>
        <div class="contenedor-principal">
            <div class="auth-card" id="forgot-step1">
                <h2>¿Olvidaste tu contraseña?</h2>
                <p class="subtitle">Ingresa tu correo registrado.</p>

                <form id="form-paso1">
                    <div class="form-group">
                        <label for="recuperar-email">Correo <span>*</span></label>
                        <input type="email" class="form-control" id="email" placeholder="nombre@dominio.com" maxlength="100" required>
                    </div>
                    <button class="btn-billar" id="btn-enviar" type="submit">
                        Enviar código de recuperación
                    </button>
                </form>

                <div class="enlace-retorno">
                    <a href="inicio_sesion.html"><i class="fa-solid fa-arrow-left"></i> Volver al inicio de sesión</a>
                </div>

            </div>

            <div class="auth-card hidden" id="forgot-step2">
                <h2 style="font-size: 20px;">Código de recuperación</h2>
                <p class="subtitle" style="font-size: 12px; margin-bottom: 8px;">Introduce el codigo enviada a: <strong id="forgot-email-show"></strong></p>

                <form id="form-paso2">

                    <div class="mesa-billar-zona" style="margin-bottom: 10px">
                        <div class="code-inputs">
                            <input type="text" class="bola-digit" maxlength="1" id="fcd0" autocomplete="off" required inputmode="numeric">
                            <input type="text" class="bola-digit" maxlength="1" id="fcd1" autocomplete="off" required inputmode="numeric">
                            <input type="text" class="bola-digit" maxlength="1" id="fcd2" autocomplete="off" required inputmode="numeric">
                            <input type="text" class="bola-digit" maxlength="1" id="fcd3" autocomplete="off" required inputmode="numeric">
                            <input type="text" class="bola-digit" maxlength="1" id="fcd4" autocomplete="off" required inputmode="numeric">
                            <input type="text" class="bola-digit" maxlength="1" id="fcd5" autocomplete="off" required inputmode="numeric">
                        </div>
                    </div>

                    <button type="submit" class="btn-billar" id="btn-verificar" style="font-size: 15px; padding: 8px; margin-top: 0px;">Verificar código</button>
                </form>
                
                <div class="resend-link" style="font-size: 12px; margin-top: 8px;">
                    ¿No recibiste el código? <a href="#" id="btn-reenviar">Reenviar código</a>
                </div>
                <div class="enlace-retorno" style="font-size: 12px; margin-top: 7px;">
                    <a href="inicio_sesion.html"><i class="fa-solid fa-arrow-left"></i> Volver al inicio de sesión</a>
                </div>
            </div>

            <div class="auth-card hidden" id="forgot-step3">
                <h2 style="font-size: 20px; margin-bottom: 13px;">Nueva contraseña</h2>

                <form id="form-paso3">
                    <div class="form-group" style="margin-bottom: 12px;">
                        <label for="login-pass" style="font-size: 14; margin-bottom: 5px;">Nueva contraseña <span>*</span></label>
                        <div class="input-password-container">
                            <input type="password" class="form-control" id="login-pass" minlength="8" maxlength="30" pattern="(?=.*[!@#$%^&*.]).{8,}" title="Debe tener al menos 8 caracteres y 1 carácter especial" placeholder="Mín. 8 caracteres y 1 especial" required style="height: 6px;">
                            <span class="toggle-passwordd">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                            </span>
                            <div id="password-requisitos" class="password-requisitos" style="display: none;"> 
                                <p>Mín. 8 caracteres y 1 especial</p>
                            </div>
                        </div>
                    </div>
                    <div class="strength-bar">
                        <div class="strength-seg" id="s1"></div>
                        <div class="strength-seg" id="s2"></div>
                        <div class="strength-seg" id="s3"></div>
                        <div class="strength-seg" id="s4"></div>
                    </div>
                    <p class="strength-label" id="strength-label"></p>

                    <div class="form-group" style="margin-bottom: 12px;">
                        <label for="login-pass-confirm" style="font-size: 14; margin-bottom: 5px;">Confirmar contraseña <span>*</span></label>
                        <div class="input-password-container">
                            <input type="password" class="form-control" id="login-pass-confirm" minlength="8" maxlength="30" pattern="(?=.*[!@#$%^&*.]).{8,}" title="Debe tener al menos 8 caracteres y 1 carácter especial" placeholder="Mín. 8 caracteres y 1 especial" required style="height: 6px;">
                            <span class="toggle-passwordd">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                            </span>
                        </div>
                    </div>

                    <button type="submit" class="btn-billar" id="btn-guardar" style="font-size: 15px; padding: 8px; margin-top: 0px;">Guardar contraseña</button>
                </form>
                <div class="enlace-retorno" style="font-size: 12px; margin-top: 7px;">
                    <a href="inicio_sesion.html"><i class="fa-solid fa-arrow-left"></i> Volver al inicio de sesión</a>
                </div>
            </div>
        </div>
    <div id="toast" style="position:fixed;top:2rem;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--color-principal);color:white;padding:10px;width:30%;border-radius:10px;font-size:18px;box-shadow:#000 0px 0px 10px;opacity:0;transition:all 0.4s cubic-bezier(0.175,0.885,0.32,1.275);z-index:300;min-width:30px;text-align:center;"></div>
    <script src="js/olvido_contraseña.js"></script>
    <script src="js/personalizacion.js"></script>
    <script src="js/memoriaPersonalizacion.js"></script>
</body>
</html>
